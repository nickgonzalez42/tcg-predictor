<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101623" />

    <!-- SEO. Per-page titles/descriptions are set client-side (usePageMeta);
         these are the crawler-visible defaults. TODO: swap SITE_URL here, in
         sitemap.xml, and robots.txt when the domain is chosen. -->
    <title>TCG Predictor — The Stock Market for Trading Cards</title>
    <meta name="description" content="Track prices, forecasts, and your collection's value for Pokémon, One Piece, Yu-Gi-Oh!, Lorcana, Digimon, and Gundam cards. AI price predictions, graded history, and a portfolio that benchmarks against the S&P 500." />
    <link rel="canonical" href="https://cardstock.guide/" />

    <!-- Open Graph (Facebook, Discord, Slack, iMessage…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TCG Predictor" />
    <meta property="og:title" content="TCG Predictor — The Stock Market for Trading Cards" />
    <meta property="og:description" content="AI price forecasts, graded price history, and portfolio tracking for Pokémon, One Piece, Yu-Gi-Oh!, Lorcana, Digimon, and Gundam cards." />
    <meta property="og:url" content="https://cardstock.guide/" />
    <meta property="og:image" content="https://cardstock.guide/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TCG Predictor — the stock market for trading cards" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TCG Predictor — The Stock Market for Trading Cards" />
    <meta name="twitter:description" content="AI price forecasts, graded price history, and portfolio tracking for trading cards." />
    <meta name="twitter:image" content="https://cardstock.guide/og-image.png" />

    <!-- Structured data: site-level -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TCG Predictor",
      "url": "https://cardstock.guide/",
      "description": "AI price forecasts and portfolio tracking for trading cards."
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
